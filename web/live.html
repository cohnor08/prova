<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Request a song</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #08090C; color: #F5F7FA; padding: 20px; }
    .wrap { max-width: 480px; margin: 0 auto; }
    .kicker { color: #6366F1; font-size: 12px; font-weight: 800; letter-spacing: 2px; }
    h1 { font-size: 26px; margin: 4px 0 2px; }
    .sub { color: #9AA0AB; font-size: 14px; margin-bottom: 20px; }
    .song { display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: #14161B; border: 1px solid #23262E; border-radius: 14px; padding: 14px 16px;
      margin-bottom: 10px; }
    .song .info { min-width: 0; }
    .song .t { font-weight: 700; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song .a { color: #9AA0AB; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .req { flex-shrink: 0; background: #6366F1; color: #fff; border: none; border-radius: 999px;
      padding: 10px 16px; font-size: 14px; font-weight: 700; }
    .req:disabled { background: #2C3140; color: #9AA0AB; }
    .tip { display: block; text-align: center; margin-top: 22px; background: #1DB954; color: #fff;
      text-decoration: none; border-radius: 14px; padding: 14px; font-weight: 800; font-size: 16px; }
    .state { text-align: center; color: #9AA0AB; padding: 60px 0; }
    .toast { position: fixed; left: 0; right: 0; bottom: 24px; text-align: center; }
    .toast span { background: #6366F1; color: #fff; padding: 10px 18px; border-radius: 999px;
      font-weight: 700; font-size: 14px; opacity: 0; transition: opacity .2s; }
    .toast span.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">LIVE NOW</div>
    <h1 id="title">Loading…</h1>
    <div class="sub" id="sub">Request a song from tonight's set</div>
    <div id="list"></div>
    <div id="empty" class="state" style="display:none">This show isn't taking requests right now.</div>
    <a id="tip" class="tip" style="display:none" target="_blank" rel="noopener">💸 Tip the artist</a>
  </div>
  <div class="toast"><span id="toast">Requested!</span></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js';

    const app = initializeApp({
      apiKey: 'AIzaSyAP7411t8bn81DoCtJI7ajy30UGaPdaRNU',
      authDomain: 'prova-583c9.firebaseapp.com',
      projectId: 'prova-583c9',
      storageBucket: 'prova-583c9.firebasestorage.app',
      messagingSenderId: '1043852862211',
      appId: '1:1043852862211:web:67435ca8660d6d5afd7f36',
    });
    const db = getFirestore(app);

    const gigId = new URLSearchParams(location.search).get('g');
    const $ = (id) => document.getElementById(id);

    function toast(msg) {
      const t = $('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1500);
    }

    async function load() {
      if (!gigId) { $('title').textContent = 'No show found'; $('sub').textContent = ''; return; }
      let snap;
      try { snap = await getDoc(doc(db, 'liveGigs', gigId)); }
      catch (e) { $('title').textContent = 'Could not load'; return; }
      if (!snap.exists() || snap.data().active === false) {
        $('title').textContent = 'Show ended'; $('sub').textContent = '';
        $('empty').style.display = 'block'; return;
      }
      const gig = snap.data();
      $('title').textContent = gig.name || "Tonight's set";
      const list = $('list');
      (gig.songs || []).forEach((s) => {
        const row = document.createElement('div');
        row.className = 'song';
        row.innerHTML = `<div class="info"><div class="t"></div><div class="a"></div></div>`;
        row.querySelector('.t').textContent = s.title || '';
        row.querySelector('.a').textContent = s.artist || '';
        const btn = document.createElement('button');
        btn.className = 'req'; btn.textContent = 'Request';
        btn.onclick = async () => {
          btn.disabled = true; btn.textContent = 'Sent ✓';
          try {
            await addDoc(collection(db, 'liveGigs', gigId, 'requests'),
              { title: s.title || '', artist: s.artist || '', ts: serverTimestamp() });
            toast('Requested!');
          } catch (e) { btn.disabled = false; btn.textContent = 'Request'; toast('Try again'); }
          setTimeout(() => { btn.disabled = false; btn.textContent = 'Request'; }, 2500);
        };
        row.appendChild(btn);
        list.appendChild(row);
      });
      if (gig.tipLink) { const tip = $('tip'); tip.href = gig.tipLink; tip.style.display = 'block'; }
    }
    load();
  </script>
</body>
</html>
